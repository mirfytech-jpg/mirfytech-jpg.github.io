<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KampBuuz — Yasal Bilgiler</title>
<style>
  :root { --primary:#2563eb; --bg:#f8fafc; --text:#1e293b; --muted:#64748b; --border:#e2e8f0; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
  header { background:#fff; border-bottom:1px solid var(--border); padding:28px 20px; text-align:center; }
  header .logo { display:inline-flex; align-items:center; gap:10px; }
  header .mark { width:40px; height:40px; border-radius:10px; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:18px; }
  header h1 { font-size:22px; }
  header p { color:var(--muted); font-size:14px; margin-top:6px; }
  .container { max-width:760px; margin:40px auto; padding:0 20px; }
  .cards { display:grid; gap:16px; }
  .card { background:#fff; border:1px solid var(--border); border-radius:14px; padding:24px; text-decoration:none; color:inherit; transition:.15s; display:block; }
  .card:hover { border-color:var(--primary); box-shadow:0 4px 14px rgba(37,99,235,.08); }
  .card h2 { font-size:18px; color:var(--primary); margin-bottom:6px; }
  .card p { color:var(--muted); font-size:14px; }
  footer { text-align:center; color:var(--muted); font-size:13px; padding:30px 20px; }
</style>
</head>
<body>
<header>
  <div class="logo"><span class="mark">KB</span><h1>KampBuuz</h1></div>
  <p>Üniversite Öğrenci Topluluğu — Yasal Bilgiler</p>
</header>
<div class="container">
  <div class="cards">
    <a class="card" href="privacy.html">
      <h2>Gizlilik Politikası</h2>
      <p>Verilerinizi nasıl topladığımızı, kullandığımızı ve koruduğumuzu öğrenin.</p>
    </a>
    <a class="card" href="terms.html">
      <h2>Kullanım Koşulları (EULA)</h2>
      <p>Uygulamayı kullanırken geçerli olan kurallar ve içerik politikası.</p>
    </a>
  </div>
</div>
<footer>© 2026 KampBuuz · İletişim: mirfytech@gmail.com</footer>
</body>
</html>
